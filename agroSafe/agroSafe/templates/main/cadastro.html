<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - AgroSafe</title>
    <link rel="stylesheet" href="/static/main/style.css">
</head>
<body>
    <div class="container">
        <div class="right-panel">
            <form class="login-form" method="post">
                <h2>Cadastro</h2>
                {% if erro %}
                    <div style="color: red; margin-bottom: 10px;">{{ erro }}</div>
                {% endif %}
                {% if sucesso %}
                    <div style="color: green; margin-bottom: 10px;">{{ sucesso }}</div>
                {% endif %}
                {% csrf_token %}
                <label for="nome">Nome</label>
                <input type="text" id="nome" name="nome" required>
                <label for="cnpj">CNPJ</label>
                <input type="text" id="cnpj" name="cnpj" required>
                <label for="regiao">Região</label>
                <input type="text" id="regiao" name="regiao" required>
                <label for="telefone">Telefone</label>
                <input type="text" id="telefone" name="telefone" required>
                <label for="email_corporativo">Email Corporativo</label>
                <input type="text" id="email_corporativo" name="email_corporativo" required>
                <label for="senha">Senha</label>
                <input type="password" id="senha" name="senha" required>
                <button type="submit">Cadastrar</button>
                <div class="login-links">
                    <a href="/login/" class="login-link">Já possui conta?</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
