services:
  backend:
    build:
      context: ./agroSafe
    container_name: agrosafe-backend
    ports:
      - "8000:8000"
    volumes:
      - ./agroSafe:/app
    environment:
      - PYTHONUNBUFFERED=1
      - DJANGO_AUTORELOAD_USE_POLLING=1

  frontend:
    build:
      context: ./agrosafe-mvp-frontend
    container_name: agrosafe-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./agrosafe-mvp-frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend

volumes:
  frontend_node_modules:
